databases:
  - name: ai-behavior-db
    plan: free
    region: singapore
    databaseName: ai_behavior
    user: ai_behavior_user

services:
  - type: web
    name: ai-behavior-system
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: ai-behavior-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true