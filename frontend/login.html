<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인 - AI 이상행동 감지 시스템</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f7f7f4;
      color: #202123;
    }

    .page {
      width: 100%;
      height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      position: relative;
    }

    .center-divider {
      position: absolute;
      top: 10vh;
      left: 50%;
      width: 1px;
      height: 80vh;
      background: #d8d8d0;
      transform: translateX(-50%);
    }

    .left-section {
      padding: 56px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 15px;
      font-weight: 800;
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      background: #111827;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
    }

    .intro {
      max-width: none;
      width: 100%;
    }

    .intro-tag {
      font-size: 14px;
      color: #8a8f98;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 18px;
      font-weight: 700;
    }

    .intro h1 {
      font-size: clamp(48px, 4.2vw, 64px);
      line-height: 1.08;
      letter-spacing: -2px;
      margin-bottom: 22px;
      white-space: nowrap;
    }

    .intro p {
      font-size: clamp(18px, 1.45vw, 22px);
      line-height: 1.6;
      color: #5f6368;
      word-break: keep-all;
      white-space: nowrap;
    }

    .system-card {
      width: 100%;
      max-width: 560px;
      padding: 24px;
      border: 1px solid #deded8;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.72);
      box-shadow: 0 20px 60px rgba(17, 24, 39, 0.08);
    }

    .system-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid #e5e5df;
      gap: 16px;
    }

    .system-row:last-child {
      border-bottom: none;
    }

    .system-label {
      font-size: 14px;
      color: #6b6f76;
    }

    .system-value {
      font-size: 14px;
      font-weight: 400;
      color: #202123;
      letter-spacing: 1px;
    }

    .online {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #15803d;
    }

    .online-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #15803d;
      animation: pulse 1.4s infinite;
    }

    @keyframes pulse {
      0% {
        box-shadow: 0 0 0 0 rgba(21, 128, 61, 0.45);
        opacity: 1;
      }

      70% {
        box-shadow: 0 0 0 8px rgba(21, 128, 61, 0);
        opacity: 0.55;
      }

      100% {
        box-shadow: 0 0 0 0 rgba(21, 128, 61, 0);
        opacity: 1;
      }
    }

    .right-section {
      padding: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-box {
      width: 100%;
      max-width: 425px;
    }

    .login-card {
      padding: 36px;
      border: 1px solid #deded8;
      border-radius: 22px;
      background: white;
      box-shadow: 0 24px 70px rgba(17, 24, 39, 0.1);
    }

    .login-header {
      margin-bottom: 28px;
    }

    .login-header h2 {
      font-size: 35px;
      margin-bottom: 8px;
      letter-spacing: -1px;
    }

    .login-header p {
      color: #6b6f76;
      font-size: 15px;
      line-height: 1.6;
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 15px;
      font-weight: 700;
      color: #5f6368;
    }

    input {
      width: 100%;
      height: 54px;
      padding: 0 18px;
      border: 1px solid #deded8;
      border-radius: 12px;
      background: white;
      color: #202123;
      font-size: 19px;
      outline: none;
    }

    input:focus {
      border-color: #111827;
      box-shadow: 0 0 0 4px rgba(17, 24, 39, 0.12);
    }

    input::placeholder {
      color: #a3a7ae;
    }

    .btn-primary {
      width: 100%;
      height: 57px;
      margin-top: 14px;
      border: none;
      border-radius: 12px;
      background: #111827;
      color: white;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
    }

    .btn-primary:hover {
      background: #2f343d;
    }

    .btn-primary:disabled {
      background: #a6abb3;
      cursor: not-allowed;
    }

    .message {
      min-height: 28px;
      margin-top: 20px;
      font-size: 15px;
      line-height: 1.5;
    }

    .message.success {
      color: #15803d;
    }

    .message.error {
      color: #dc2626;
    }

    .footer-link {
      margin-top: 28px;
      text-align: center;
      color: #6b6f76;
      font-size: 15px;
    }

    .footer-link a {
      color: #202123;
      font-weight: 800;
      text-decoration: none;
      border-bottom: 1px solid #202123;
      padding-bottom: 2px;
    }

    @media (max-width: 900px) {
      html,
      body {
        overflow: auto;
      }

      .page {
        height: auto;
        min-height: 100vh;
        grid-template-columns: 1fr;
      }

      .center-divider {
        display: none;
      }

      .left-section {
        padding: 32px 24px;
        gap: 40px;
      }

      .intro h1 {
        font-size: 44px;
        white-space: normal;
      }

      .intro p {
        font-size: 15px;
        white-space: normal;
      }

      .system-card {
        display: none;
      }

      .right-section {
        padding: 24px;
        align-items: flex-start;
      }

      .login-card {
        padding: 32px 26px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <div class="center-divider"></div>

    <section class="left-section">
      <div class="brand">
        <div class="brand-mark">AI</div>
        <div>AI Security System</div>
      </div>

      <div class="intro">
        <div class="intro-tag">Monitoring Console</div>
        <h1>이상행동 감지 시스템</h1>
        <p>영상 업로드, 실시간 CCTV 분석을 통한 보안 모니터링 서비스</p>
      </div>

      <div class="system-card">
        <div class="system-row">
          <div class="system-label">System Status</div>
          <div class="system-value online">
            <span class="online-dot"></span>
            ONLINE
          </div>
        </div>

        <div class="system-row">
          <div class="system-label">Access Mode</div>
          <div class="system-value">SECURE LOGIN</div>
        </div>
      </div>
    </section>

    <section class="right-section">
      <div class="login-box">
        <div class="login-card">
          <div class="login-header">
            <h2>로그인</h2>
            <p>등록된 계정으로 로그인하여 시스템을 이용하세요.</p>
          </div>

          <form id="loginForm" autocomplete="off">
            <div class="field">
              <label for="email">이메일</label>
              <input
                type="email"
                id="email"
                placeholder="admin@example.com"
                required
              />
            </div>

            <div class="field">
              <label for="password">비밀번호</label>
              <input
                type="password"
                id="password"
                placeholder="비밀번호를 입력하세요"
                required
              />
            </div>

            <button type="submit" id="loginBtn" class="btn-primary">
              로그인
            </button>
          </form>

          <div id="message" class="message"></div>
        </div>

        <div class="footer-link">
          아직 계정이 없나요?
          <a href="./signup.html">회원가입</a>
        </div>
      </div>
    </section>
  </main>

  <script>
    const BASE_URL = window.location.port === "5500" ? "http://127.0.0.1:8000" : window.location.origin;

    const loginForm = document.getElementById("loginForm");
    const loginBtn  = document.getElementById("loginBtn");
    const message   = document.getElementById("message");

    loginForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      const email    = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      if (!email || !password) {
        message.className = "message error";
        message.textContent = "이메일과 비밀번호를 입력해주세요.";
        return;
      }

      try {
        loginBtn.disabled = true;
        message.className = "message";
        message.textContent = "로그인 확인 중입니다...";

        const response = await fetch(`${BASE_URL}/auth/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.detail || "로그인에 실패했습니다.");
        }

        localStorage.setItem("accessToken",  data.access_token);
        localStorage.setItem("loggedInUser", JSON.stringify(data.user));

        message.className = "message success";
        message.textContent = "로그인 완료. 메인 화면으로 이동합니다.";

        setTimeout(() => {
          window.location.href = "/frontend/index.html";
        }, 800);

      } catch (error) {
        message.className = "message error";
        message.textContent = error.message;
      } finally {
        loginBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
