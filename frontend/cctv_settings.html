<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CCTV 설정 - AI 이상행동 감지 시스템</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f7f7f4;
      color: #202123;
    }

    .page {
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 28px;
      gap: 22px;
    }

    .navbar {
      height: 66px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 22px;
      border: 1px solid #deded8;
      border-radius: 18px;
      background: #ffffff;
      box-shadow: 0 16px 40px rgba(17, 24, 39, 0.08);
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      background: #111827;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .nav-title {
      font-size: 18px;
      font-weight: 800;
      color: #202123;
      letter-spacing: -0.3px;
    }

    .nav-subtitle {
      margin-top: 3px;
      font-size: 13px;
      color: #6b6f76;
    }

    .nav-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    button {
      border-radius: 11px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
      white-space: nowrap;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 20px rgba(17, 24, 39, 0.12);
    }

    button:active {
      transform: translateY(0);
      box-shadow: none;
    }

    .btn-primary {
      border: 1px solid #111827;
      background: #111827;
      color: white;
    }

    .btn-secondary,
    .nav-btn,
    .btn-reload,
    .btn-edit {
      border: 1px solid #deded8;
      background: #ffffff;
      color: #202123;
    }

    .btn-danger,
    .nav-btn.danger,
    .btn-delete {
      border: 1px solid #c9c9c1;
      background: #ffffff;
      color: #202123;
    }

    .btn-secondary:hover,
    .nav-btn:hover,
    .btn-reload:hover,
    .btn-edit:hover,
    .btn-danger:hover,
    .nav-btn.danger:hover,
    .btn-delete:hover {
      background: #f1f1ee;
    }

    .btn-create {
      width: 100%;
      height: 48px;
      margin-top: 8px;
      border: 1px solid #111827;
      border-radius: 12px;
      background: #111827;
      color: white;
      font-size: 15px;
      font-weight: 800;
    }

    .main {
      min-height: 0;
      flex: 1;
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 22px;
    }

    .panel-left,
    .panel-right {
      min-height: 0;
      border: 1px solid #deded8;
      border-radius: 22px;
      background: #ffffff;
      box-shadow: 0 20px 60px rgba(17, 24, 39, 0.08);
    }

    .panel-left {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .panel-right {
      padding: 24px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-title {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: #202123;
    }

    .panel-desc {
      margin-top: 8px;
      font-size: 15px;
      line-height: 1.6;
      color: #6b6f76;
      word-break: keep-all;
    }

    .card {
      margin-top: 8px;
      padding: 20px;
      border: 1px solid #e5e5df;
      border-radius: 18px;
      background: #fbfbf8;
    }

    .card h2 {
      margin-bottom: 18px;
      font-size: 20px;
      color: #202123;
      letter-spacing: -0.3px;
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 700;
      color: #5f6368;
    }

    input,
    select {
      width: 100%;
      height: 46px;
      border: 1px solid #d8d8d0;
      border-radius: 12px;
      background: white;
      color: #202123;
      padding: 0 13px;
      font-size: 15px;
      outline: none;
    }

    input:focus,
    select:focus {
      border-color: #111827;
      box-shadow: 0 0 0 4px rgba(17, 24, 39, 0.12);
    }

    input::placeholder {
      color: #a3a7ae;
    }

    .create-status {
      min-height: 22px;
      margin-top: 14px;
      font-size: 14px;
      line-height: 1.5;
      color: #6b6f76;
    }

    .create-status.success,
    .create-status.error {
      color: #202123;
    }

    .panel-right-header {
      flex-shrink: 0;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 18px;
    }

    .table-wrap {
      min-height: 0;
      flex: 1;
      overflow: auto;
      border: 1px solid #e5e5df;
      border-radius: 16px;
      background: white;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 15px;
    }

    thead {
      position: sticky;
      top: 0;
      z-index: 2;
    }

    th {
      background: #f1f1ee;
      color: #374151;
      padding: 14px;
      text-align: left;
      font-size: 14px;
      font-weight: 800;
      white-space: nowrap;
      border-bottom: 1px solid #deded8;
    }

    td {
      padding: 13px 14px;
      border-bottom: 1px solid #eeeeea;
      color: #202123;
      vertical-align: middle;
      white-space: nowrap;
    }

    tbody tr:hover td {
      background: #fafaf7;
    }

    td input,
    td select {
      min-width: 180px;
      height: 40px;
      font-size: 14px;
    }

    .btn-edit,
    .btn-delete {
      padding: 8px 12px;
      font-size: 13px;
    }

    .muted {
      color: #6b6f76;
      font-size: 15px;
    }

    @media (max-width: 980px) {
      html,
      body {
        overflow: auto;
      }

      .page {
        height: auto;
        min-height: 100vh;
      }

      .navbar {
        height: auto;
        padding: 18px;
        align-items: flex-start;
        flex-direction: column;
        gap: 16px;
      }

      .nav-actions {
        width: 100%;
        justify-content: flex-start;
      }

      .main {
        grid-template-columns: 1fr;
      }

      .panel-left,
      .panel-right {
        min-height: 320px;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <nav class="navbar">
      <div class="nav-brand">
        <div class="brand-mark">AI</div>
        <div>
          <div class="nav-title">CCTV 설정</div>
          <div class="nav-subtitle">카메라 등록, 수정, 삭제를 관리합니다.</div>
        </div>
      </div>

      <div class="nav-actions">
        <button class="nav-btn" id="mainBtn">메인</button>
        <button class="nav-btn" id="cctvLiveBtn">실시간 CCTV 확인</button>
        <button class="nav-btn" id="adminBtn">관리자 대시보드</button>
        <button class="nav-btn danger" id="logoutBtn">로그아웃</button>
      </div>
    </nav>

    <div class="main">
      <section class="panel-left">
        <div>
          <div class="panel-title">CCTV 등록</div>
          <p class="panel-desc">
            새 CCTV 이름과 설치 위치를 입력해 모니터링 대상 카메라를 추가합니다.
          </p>
        </div>

        <div class="card">
          <h2>카메라 정보 입력</h2>

          <div class="field">
            <label for="cameraNameInput">카메라 이름</label>
            <input type="text" id="cameraNameInput" placeholder="예: CAM-01" />
          </div>

          <div class="field">
            <label for="cameraLocationInput">설치 위치</label>
            <input type="text" id="cameraLocationInput" placeholder="예: 1층 출입구" />
          </div>

          <button class="btn-create" id="createBtn">CCTV 등록</button>
          <div class="create-status" id="createStatus"></div>
        </div>
      </section>

      <section class="panel-right">
        <div class="panel-right-header">
          <div>
            <div class="panel-title">CCTV 목록</div>
            <p class="panel-desc">
              등록된 CCTV 정보를 확인하고 이름, 위치, 활성 상태를 수정할 수 있습니다.
            </p>
          </div>

          <button class="btn-reload" id="reloadBtn">새로고침</button>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>카메라 이름</th>
                <th>위치</th>
                <th>상태</th>
                <th>수정</th>
                <th>삭제</th>
              </tr>
            </thead>

            <tbody id="cameraTableBody">
              <tr>
                <td colspan="6" class="muted">CCTV 목록을 불러오는 중입니다.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </div>
  </div>

  <script>
    const BASE_URL = window.location.port === "5500" ? "http://127.0.0.1:8000" : window.location.origin;
    const FRONT_LOGIN_URL = `${window.location.origin}/frontend/login.html`;

    const accessToken = localStorage.getItem("accessToken");
    const loggedInUserRaw = localStorage.getItem("loggedInUser");
    const loggedInUser = loggedInUserRaw ? JSON.parse(loggedInUserRaw) : null;

    if (!accessToken || !loggedInUser) {
      alert("로그인이 필요합니다.");
      window.location.href = FRONT_LOGIN_URL;
    }

    if (loggedInUser.role !== "admin") {
      alert("관리자 권한이 필요합니다.");
      window.location.href = "/frontend/index.html";
    }

    function authHeaders(extraHeaders = {}) {
      return { ...extraHeaders, "Authorization": `Bearer ${accessToken}` };
    }

    const cameraNameInput     = document.getElementById("cameraNameInput");
    const cameraLocationInput = document.getElementById("cameraLocationInput");
    const createBtn           = document.getElementById("createBtn");
    const createStatus        = document.getElementById("createStatus");
    const reloadBtn           = document.getElementById("reloadBtn");
    const cameraTableBody     = document.getElementById("cameraTableBody");
    const mainBtn             = document.getElementById("mainBtn");
    const cctvLiveBtn         = document.getElementById("cctvLiveBtn");
    const adminBtn            = document.getElementById("adminBtn");
    const logoutBtn           = document.getElementById("logoutBtn");

    async function loadCameras() {
      try {
        const response = await fetch(`${BASE_URL}/cctv/`, {
          method: "GET",
          headers: authHeaders()
        });

        if (!response.ok) throw new Error("CCTV 목록 조회 실패");

        const result  = await response.json();
        const cameras = result.data || [];

        if (cameras.length === 0) {
          cameraTableBody.innerHTML = `<tr><td colspan="6" class="muted">등록된 CCTV가 없습니다.</td></tr>`;
          return;
        }

        cameraTableBody.innerHTML = cameras.map(camera => `
          <tr>
            <td>${camera.id}</td>
            <td><input id="name-${camera.id}" value="${camera.camera_name}" /></td>
            <td><input id="location-${camera.id}" value="${camera.camera_location}" /></td>
            <td>
              <select id="active-${camera.id}">
                <option value="true"  ${camera.is_active  ? "selected" : ""}>active</option>
                <option value="false" ${!camera.is_active ? "selected" : ""}>inactive</option>
              </select>
            </td>
            <td><button class="btn-edit" onclick="updateCamera(${camera.id})">수정</button></td>
            <td><button class="btn-delete" onclick="deleteCamera(${camera.id})">삭제</button></td>
          </tr>
        `).join("");

      } catch (error) {
        cameraTableBody.innerHTML = `<tr><td colspan="6">오류: ${error.message}</td></tr>`;
      }
    }

    createBtn.addEventListener("click", async () => {
      const cameraName     = cameraNameInput.value.trim();
      const cameraLocation = cameraLocationInput.value.trim();

      if (!cameraName || !cameraLocation) {
        createStatus.className   = "create-status error";
        createStatus.textContent = "카메라 이름과 위치를 모두 입력해주세요.";
        return;
      }

      try {
        const response = await fetch(`${BASE_URL}/cctv/`, {
          method: "POST",
          headers: authHeaders({ "Content-Type": "application/json" }),
          body: JSON.stringify({ camera_name: cameraName, camera_location: cameraLocation })
        });

        const result = await response.json();
        if (!response.ok) throw new Error(result.detail || "CCTV 등록 실패");

        createStatus.className    = "create-status success";
        createStatus.textContent  = "CCTV 등록 성공";
        cameraNameInput.value     = "";
        cameraLocationInput.value = "";
        await loadCameras();

      } catch (error) {
        createStatus.className   = "create-status error";
        createStatus.textContent = `오류: ${error.message}`;
      }
    });

    async function updateCamera(cameraId) {
      const cameraName     = document.getElementById(`name-${cameraId}`).value.trim();
      const cameraLocation = document.getElementById(`location-${cameraId}`).value.trim();
      const isActive       = document.getElementById(`active-${cameraId}`).value === "true";

      try {
        const response = await fetch(`${BASE_URL}/cctv/${cameraId}`, {
          method: "PATCH",
          headers: authHeaders({ "Content-Type": "application/json" }),
          body: JSON.stringify({ camera_name: cameraName, camera_location: cameraLocation, is_active: isActive })
        });

        const result = await response.json();
        if (!response.ok) throw new Error(result.detail || "CCTV 수정 실패");

        alert("CCTV 정보가 수정되었습니다.");
        await loadCameras();

      } catch (error) {
        alert(`오류: ${error.message}`);
      }
    }

    async function deleteCamera(cameraId) {
      if (!confirm("정말 삭제할까요?")) return;

      try {
        const response = await fetch(`${BASE_URL}/cctv/${cameraId}`, {
          method: "DELETE",
          headers: authHeaders()
        });

        const result = await response.json();
        if (!response.ok) throw new Error(result.detail || "CCTV 삭제 실패");

        alert("CCTV가 삭제되었습니다.");
        await loadCameras();

      } catch (error) {
        alert(`오류: ${error.message}`);
      }
    }

    mainBtn.addEventListener("click", () => {
      window.location.href = "/frontend/index.html";
    });

    cctvLiveBtn.addEventListener("click", () => {
      window.location.href = "/frontend/cctv_live.html";
    });

    adminBtn.addEventListener("click", () => {
      window.location.href = "/frontend/admin.html";
    });

    logoutBtn.addEventListener("click", () => {
      localStorage.removeItem("accessToken");
      localStorage.removeItem("loggedInUser");
      alert("로그아웃 되었습니다.");
      window.location.href = FRONT_LOGIN_URL;
    });

    reloadBtn.addEventListener("click", loadCameras);
    loadCameras();
  </script>
</body>
</html>
